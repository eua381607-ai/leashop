{% if page_obj.has_other_pages %}
<nav aria-label="Pagination" class="mt-4">
    <ul class="pagination justify-content-center">
        {% if page_obj.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?{% if query %}q={{ query }}&{% endif %}{% if active_category %}category={{ active_category.slug }}&{% endif %}page={{ page_obj.previous_page_number }}">Précédent</a>
            </li>
        {% endif %}
        <li class="page-item disabled">
            <span class="page-link">Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
        </li>
        {% if page_obj.has_next %}
            <li class="page-item">
                <a class="page-link" href="?{% if query %}q={{ query }}&{% endif %}{% if active_category %}category={{ active_category.slug }}&{% endif %}page={{ page_obj.next_page_number }}">Suivant</a>
            </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
